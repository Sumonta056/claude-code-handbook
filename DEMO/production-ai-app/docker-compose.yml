version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      APP_NAME: Production AI App Demo
      DEBUG: "true"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      API_BASE_URL: http://api:8000
      PORT: "5001"
    depends_on:
      - api
    ports:
      - "5001:5001"
